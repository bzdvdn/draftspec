name: release-build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run test suite
        run: go test ./...

  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_ext: .exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            binary_ext: .exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build draftspec
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          output="dist/draftspec${{ matrix.binary_ext }}"
          go build -trimpath -o "${output}" ./src/cmd/draftspec

      - name: Package Linux archive
        if: matrix.goos == 'linux'
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="draftspec_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar -C dist -czf "dist/${asset}" "draftspec"

      - name: Package Windows archive
        if: matrix.goos == 'windows'
        run: |
          tag="${GITHUB_REF_NAME}"
          asset="draftspec_${tag}_${{ matrix.goos }}_${{ matrix.goarch }}.zip"
          cd dist
          zip "${asset}" "draftspec.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: draftspec-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/draftspec_${{ github.ref_name }}_${{ matrix.goos }}_${{ matrix.goarch }}.${{ matrix.archive_ext }}
          if-no-files-found: error
